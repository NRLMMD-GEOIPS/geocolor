docstring: |
  The test datasets corresponding to these sectors can be found in the test_data_geocolor test data.

  ```
  geoips config install-github test_data_geocolor
  ```

  GOES West subsector, centered at 19 latitude, -154 longitude
  300x300 at 3km resolution

  This sector covers part of Hawaii, containing approximately have land and 
  half ocean pixels for GOES West.
  It is a very small sector that can be used for GOES West processing
  using the Geocolor dataset 20240924T1500Z from CIRA.

