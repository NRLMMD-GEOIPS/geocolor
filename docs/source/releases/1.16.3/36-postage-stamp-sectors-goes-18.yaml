- title: 'Add dataset specific tiny sectors for geocolor 20240924T1500Z goes-18 dataset'
  description: |
    Add edge of scan, terminator, and day/night tiny sectors for the geocolor goes-18
    20240924T1500Z dataset.

    * edge of scan day-time is at 12 lat -67 lon, over the caribbean with land and ocean pixels.
    * edge of scan night-time is at 12 lat 153 lon, near micronesia 
    * terminator image is at 39 lat -125 lon, off coast of alaska
    * daytime only is at 28 lat -94 lon, off the coast of Texas
    * night-time only is at 28 lat -160 lon, off the coast of Texas ?
