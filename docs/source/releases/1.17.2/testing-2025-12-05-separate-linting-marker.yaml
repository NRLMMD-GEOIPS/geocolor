testing:
- title: 'Separate build_docs and check_code into separate lint pytest marker'
  description: |
    To allow quickly running code and documentation formatting checks across a
    repository, separate out build_docs and check_code into a separate 'lint' pytest
    marker.  Linting still runs from full 'integration' marker, but can now run
    directly with lint marker.

    Also removed descriptive information from tiny sectors integration test script,
    and just point to geoips tiny sector integration test script for more information.
