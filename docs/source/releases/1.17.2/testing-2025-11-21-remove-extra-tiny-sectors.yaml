testing:
  - title: Remove extra tiny sectors
    description: |
      Now only creating a single tiny sector per dataset.  Only a single dataset per
      geostationary satellite has the full suite of tiny sectors (day, night, terminator,
      day edge, night edge, edge, nadir, landocean, full disk), which will live in the
      geoips repo.  All other datasets will have only a single tiny sector - terminator
      if it exists, day only if daytime data exists, or night only if nighttime data
      exists.

      Removed from geeocolor/plugins/yaml/sectors, as well as the calls from the
      pytest script.  Also updated pytest script with informative comments to match
      updates in geoips repo.
